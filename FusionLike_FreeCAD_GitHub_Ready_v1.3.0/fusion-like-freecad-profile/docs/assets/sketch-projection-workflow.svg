<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" role="img" aria-label="Sketch projection and extrusion workflow"><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#172033" flood-opacity="0.14"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3d7eff"/></marker><style>.t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#172033}.title{font-size:34px;font-weight:750}.h{font-size:23px;font-weight:700}.b{font-size:18px;font-weight:500}.s{font-size:15px;font-weight:500}.xs{font-size:13px;font-weight:500}.muted{fill:#607087}.card{fill:white;stroke:#d9e1ec;stroke-width:2;rx:16;filter:url(#shadow)}</style></defs><rect width="100%" height="100%" fill="#f7f9fc"/><text class="t title" x="60" y="70">Sketch → Project → Extrude</text><text class="t b muted" x="60" y="105">Persistent references from imported or earlier geometry</text><g><rect class="card" x="60" y="235" width="215" height="260"/><circle cx="168" cy="300" r="36" fill="#00a6a6"/><text class="t h" x="168" y="309" text-anchor="middle" fill="white">1</text><text class="t s" x="168" y="370" text-anchor="middle"><tspan x="168" dy="0">Open or create Sketch</tspan></text><text class="t xs" x="168" y="418" fill="#607087" text-anchor="middle"><tspan x="168" dy="0">Context ribbon switches</tspan><tspan x="168" dy="22">automatically</tspan></text></g><path d="M275 365 L308 365" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="315" y="235" width="215" height="260"/><circle cx="423" cy="300" r="36" fill="#3d7eff"/><text class="t h" x="423" y="309" text-anchor="middle" fill="white">2</text><text class="t s" x="423" y="370" text-anchor="middle"><tspan x="423" dy="0">Press P</tspan></text><text class="t xs" x="423" y="418" fill="#607087" text-anchor="middle"><tspan x="423" dy="0">Linked defining</tspan><tspan x="423" dy="22">projection</tspan></text></g><path d="M530 365 L563 365" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="570" y="235" width="215" height="260"/><circle cx="678" cy="300" r="36" fill="#7d67c7"/><text class="t h" x="678" y="309" text-anchor="middle" fill="white">3</text><text class="t s" x="678" y="370" text-anchor="middle"><tspan x="678" dy="0">Pick face / edge / sketch</tspan></text><text class="t xs" x="678" y="418" fill="#607087" text-anchor="middle"><tspan x="678" dy="0">Cross-body sources use</tspan><tspan x="678" dy="22">a SubShapeBinder</tspan></text></g><path d="M785 365 L818 365" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="825" y="235" width="215" height="260"/><circle cx="933" cy="300" r="36" fill="#f4a261"/><text class="t h" x="933" y="309" text-anchor="middle" fill="white">4</text><text class="t s" x="933" y="370" text-anchor="middle"><tspan x="933" dy="0">Finish sketch</tspan></text><text class="t xs" x="933" y="418" fill="#607087" text-anchor="middle"><tspan x="933" dy="0">Esc ends picking;</tspan><tspan x="933" dy="22">Leave Sketch commits</tspan></text></g><path d="M1040 365 L1073 365" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="1080" y="235" width="215" height="260"/><circle cx="1188" cy="300" r="36" fill="#54b689"/><text class="t h" x="1188" y="309" text-anchor="middle" fill="white">5</text><text class="t s" x="1188" y="370" text-anchor="middle"><tspan x="1188" dy="0">Press E</tspan></text><text class="t xs" x="1188" y="418" fill="#607087" text-anchor="middle"><tspan x="1188" dy="0">Choose Pad or</tspan><tspan x="1188" dy="22">Pocket</tspan></text></g><path d="M1295 365 L1328 365" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="1335" y="235" width="215" height="260"/><circle cx="1443" cy="300" r="36" fill="#00a6a6"/><text class="t h" x="1443" y="309" text-anchor="middle" fill="white">6</text><text class="t s" x="1443" y="370" text-anchor="middle"><tspan x="1443" dy="0">Continue modeling</tspan></text><text class="t xs" x="1443" y="418" fill="#607087" text-anchor="middle"><tspan x="1443" dy="0">Projected geometry</tspan><tspan x="1443" dy="22">remains linked</tspan></text></g><rect x="120" y="585" width="1360" height="145" rx="18" fill="#eef7f7" stroke="#00a6a6" stroke-width="2"/><text class="t h" x="155" y="630">Reference modes</text><text class="t b" x="155" y="675"><tspan font-weight="700">P</tspan> — defining geometry for Pad/Pocket</text><text class="t b" x="670" y="675"><tspan font-weight="700">Shift+P</tspan> — construction/reference geometry</text><text class="t b" x="1190" y="675"><tspan font-weight="700">Intersect</tspan> — sketch-plane intersection</text></svg>
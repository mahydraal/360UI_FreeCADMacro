<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-label="Fusion-like FreeCAD keyboard shortcut map">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#172033" flood-opacity="0.14"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3d7eff"/></marker>
  <style>
    .t { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #172033; }
    .title { font-size: 34px; font-weight: 750; }
    .h { font-size: 23px; font-weight: 700; }
    .b { font-size: 18px; font-weight: 500; }
    .s { font-size: 15px; font-weight: 500; }
    .xs { font-size: 13px; font-weight: 500; }
    .muted { fill: #607087; }
    .card { fill: white; stroke: #d9e1ec; stroke-width: 2; rx: 16; filter: url(#shadow); }
  </style>
</defs>
<rect width="100%" height="100%" fill="#f7f9fc"/>

<text class="t title" x="60" y="70">Keyboard map</text><text class="t b muted" x="60" y="105">Context-sensitive shortcuts; text inputs and modal dialogs are protected</text>
<g><rect x="75" y="150" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="90" y="165" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="147" y="196" fill="white" text-anchor="middle">S</text><text class="t s" x="225" y="197">Command search</text></g><g><rect x="455" y="150" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="470" y="165" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="527" y="196" fill="white" text-anchor="middle">E</text><text class="t s" x="605" y="197">Pad / Pocket</text></g><g><rect x="835" y="150" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="850" y="165" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="907" y="196" fill="white" text-anchor="middle">Q</text><text class="t s" x="985" y="197">Press / Pull</text></g><g><rect x="1215" y="150" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="1230" y="165" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="1287" y="196" fill="white" text-anchor="middle">H</text><text class="t s" x="1365" y="197">Hole / Thread</text></g><g><rect x="75" y="255" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="90" y="270" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="147" y="301" fill="white" text-anchor="middle">Shift+T</text><text class="t s" x="225" y="302">Independent Thread</text></g><g><rect x="455" y="255" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="470" y="270" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="527" y="301" fill="white" text-anchor="middle">P</text><text class="t s" x="605" y="302">Project profile</text></g><g><rect x="835" y="255" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="850" y="270" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="907" y="301" fill="white" text-anchor="middle">Shift+P</text><text class="t s" x="985" y="302">Project reference</text></g><g><rect x="1215" y="255" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="1230" y="270" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="1287" y="301" fill="white" text-anchor="middle">Esc</text><text class="t s" x="1365" y="302">End projection</text></g><g><rect x="75" y="360" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="90" y="375" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="147" y="406" fill="white" text-anchor="middle">F</text><text class="t s" x="225" y="407">Fillet</text></g><g><rect x="455" y="360" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="470" y="375" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="527" y="406" fill="white" text-anchor="middle">M</text><text class="t s" x="605" y="407">Move / Transform</text></g><g><rect x="835" y="360" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="850" y="375" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="907" y="406" fill="white" text-anchor="middle">V</text><text class="t s" x="985" y="407">Visibility</text></g><g><rect x="1215" y="360" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="1230" y="375" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="1287" y="406" fill="white" text-anchor="middle">I</text><text class="t s" x="1365" y="407">Measure</text></g><g><rect x="75" y="465" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="90" y="480" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="147" y="511" fill="white" text-anchor="middle">L</text><text class="t s" x="225" y="512">Sketch line</text></g><g><rect x="455" y="465" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="470" y="480" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="527" y="511" fill="white" text-anchor="middle">R</text><text class="t s" x="605" y="512">Rectangle</text></g><g><rect x="835" y="465" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="850" y="480" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="907" y="511" fill="white" text-anchor="middle">C</text><text class="t s" x="985" y="512">Circle</text></g><g><rect x="1215" y="465" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="1230" y="480" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="1287" y="511" fill="white" text-anchor="middle">T</text><text class="t s" x="1365" y="512">Trim</text></g><g><rect x="75" y="570" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="90" y="585" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="147" y="616" fill="white" text-anchor="middle">O</text><text class="t s" x="225" y="617">Offset</text></g><g><rect x="455" y="570" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="470" y="585" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="527" y="616" fill="white" text-anchor="middle">D</text><text class="t s" x="605" y="617">Dimension</text></g><g><rect x="835" y="570" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="850" y="585" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="907" y="616" fill="white" text-anchor="middle">X</text><text class="t s" x="985" y="617">Construction</text></g><g><rect x="1215" y="570" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="1230" y="585" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="1287" y="616" fill="white" text-anchor="middle">Ctrl+C</text><text class="t s" x="1365" y="617">Copy component</text></g><g><rect x="75" y="675" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="90" y="690" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="147" y="721" fill="white" text-anchor="middle">Ctrl+V</text><text class="t s" x="225" y="722">Paste offset</text></g><g><rect x="455" y="675" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="470" y="690" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="527" y="721" fill="white" text-anchor="middle">Ctrl+Shift+V</text><text class="t s" x="605" y="722">Paste in place</text></g><g><rect x="835" y="675" width="330" height="78" rx="13" fill="white" stroke="#d9e1ec" stroke-width="2"/><rect x="850" y="690" width="115" height="48" rx="9" fill="#27324a"/><text class="t s" x="907" y="721" fill="white" text-anchor="middle">Ctrl+D</text><text class="t s" x="985" y="722">Duplicate component</text></g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-label="Fusion-like FreeCAD runtime architecture"><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#172033" flood-opacity="0.14"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3d7eff"/></marker><style>.t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#172033}.title{font-size:34px;font-weight:750}.h{font-size:23px;font-weight:700}.b{font-size:18px;font-weight:500}.s{font-size:15px;font-weight:500}.xs{font-size:13px;font-weight:500}.muted{fill:#607087}.card{fill:white;stroke:#d9e1ec;stroke-width:2;rx:16;filter:url(#shadow)}</style></defs><rect width="100%" height="100%" fill="#f7f9fc"/><text class="t title" x="60" y="70">Runtime architecture</text><text class="t b muted" x="60" y="105">Startup, context routing, native commands, and persistent model objects</text><g><rect class="card" x="80" y="170" width="300" height="135"/><rect x="80" y="170" width="300" height="12" rx="6" fill="#3d7eff"/><text class="t h" x="104" y="222">Installer macro</text><text class="t s" x="104" y="257" fill="#607087"><tspan x="104" dy="0">Writes user</tspan><tspan x="104" dy="23">Mod/FusionLikeUI files</tspan></text></g><g><rect class="card" x="450" y="170" width="300" height="135"/><rect x="450" y="170" width="300" height="12" rx="6" fill="#00a6a6"/><text class="t h" x="474" y="222">InitGui.py</text><text class="t s" x="474" y="257" fill="#607087"><tspan x="474" dy="0">Delayed startup</tspan><tspan x="474" dy="23">and retry loop</tspan></text></g><g><rect class="card" x="820" y="170" width="300" height="135"/><rect x="820" y="170" width="300" height="12" rx="6" fill="#7d67c7"/><text class="t h" x="844" y="222">Runtime start()</text><text class="t s" x="844" y="257" fill="#607087"><tspan x="844" dy="0">Registers commands,</tspan><tspan x="844" dy="23">menu, and profile</tspan></text></g><g><rect class="card" x="1190" y="170" width="300" height="135"/><rect x="1190" y="170" width="300" height="12" rx="6" fill="#f4a261"/><text class="t h" x="1214" y="222">FusionProfile</text><text class="t s" x="1214" y="257" fill="#607087"><tspan x="1214" dy="0">Owns toolbars, timers,</tspan><tspan x="1214" dy="23">and event hooks</tspan></text></g><g><rect class="card" x="120" y="430" width="340" height="170"/><rect x="120" y="430" width="340" height="12" rx="6" fill="#00a6a6"/><text class="t h" x="144" y="482">Context router</text><text class="t s" x="144" y="517" fill="#607087"><tspan x="144" dy="0">Design · Sketch</tspan><tspan x="144" dy="23">Assembly · Drawing</tspan></text></g><g><rect class="card" x="530" y="430" width="340" height="170"/><rect x="530" y="430" width="340" height="12" rx="6" fill="#3d7eff"/><text class="t h" x="554" y="482">Native FreeCAD commands</text><text class="t s" x="554" y="517" fill="#607087"><tspan x="554" dy="0">Part Design · Sketcher</tspan><tspan x="554" dy="23">TechDraw · Assembly</tspan></text></g><g><rect class="card" x="940" y="430" width="340" height="170"/><rect x="940" y="430" width="340" height="12" rx="6" fill="#7d67c7"/><text class="t h" x="964" y="482">Persistent helpers</text><text class="t s" x="964" y="517" fill="#607087"><tspan x="964" dy="0">SubShapeBinder · Thread</tspan><tspan x="964" dy="23">App::Link</tspan></text></g><g><rect class="card" x="1350" y="430" width="180" height="170"/><rect x="1350" y="430" width="180" height="12" rx="6" fill="#f4a261"/><text class="t h" x="1374" y="482">Preferences</text><text class="t s" x="1374" y="517" fill="#607087"><tspan x="1374" dy="0">Layout · enabled state</tspan><tspan x="1374" dy="23">workspace</tspan></text></g><path d="M380 238 L445 238" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><path d="M750 238 L815 238" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><path d="M1120 238 L1185 238" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><path d="M1340 305 L1340 370 L290 370 L290 425" fill="none" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><path d="M460 515 L525 515" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><path d="M870 515 L935 515" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><path d="M1280 515 L1345 515" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><rect x="140" y="690" width="1320" height="120" rx="18" fill="#eef2f7" stroke="#d9e1ec"/><text class="t h" x="175" y="735">Design principle</text><text class="t b" x="175" y="775">Reuse native FreeCAD objects and commands; add workflow glue only where FreeCAD lacks an equivalent interaction.</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" role="img" aria-label="Installation and verification flow"><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#172033" flood-opacity="0.14"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3d7eff"/></marker><style>.t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#172033}.title{font-size:34px;font-weight:750}.h{font-size:23px;font-weight:700}.b{font-size:18px;font-weight:500}.s{font-size:15px;font-weight:500}.xs{font-size:13px;font-weight:500}.muted{fill:#607087}.card{fill:white;stroke:#d9e1ec;stroke-width:2;rx:16;filter:url(#shadow)}</style></defs><rect width="100%" height="100%" fill="#f7f9fc"/><text class="t title" x="60" y="70">Install and verify</text><text class="t b muted" x="60" y="105">Recommended public-test setup</text><g><rect class="card" x="80" y="155" width="430" height="235"/><circle cx="135" cy="213" r="31" fill="#3d7eff"/><text class="t h" x="135" y="222" fill="white" text-anchor="middle">1</text><text class="t h" x="185" y="222">Download release</text><text class="t b" x="115" y="283" fill="#607087"><tspan x="115" dy="0">Use the versioned installer</tspan><tspan x="115" dy="30">macro from Releases.</tspan></text></g><path d="M510 273 L560 273" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="580" y="155" width="430" height="235"/><circle cx="635" cy="213" r="31" fill="#3d7eff"/><text class="t h" x="635" y="222" fill="white" text-anchor="middle">2</text><text class="t h" x="685" y="222">Locate macro folder</text><text class="t b" x="615" y="283" fill="#607087"><tspan x="615" dy="0">FreeCAD → Macro → Macros…</tspan><tspan x="615" dy="30">Read User macros location.</tspan></text></g><path d="M1010 273 L1060 273" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="1080" y="155" width="430" height="235"/><circle cx="1135" cy="213" r="31" fill="#3d7eff"/><text class="t h" x="1135" y="222" fill="white" text-anchor="middle">3</text><text class="t h" x="1185" y="222">Run installer</text><text class="t b" x="1115" y="283" fill="#607087"><tspan x="1115" dy="0">Select the versioned macro</tspan><tspan x="1115" dy="30">and click Execute.</tspan></text></g><g><rect class="card" x="80" y="470" width="430" height="235"/><circle cx="135" cy="528" r="31" fill="#3d7eff"/><text class="t h" x="135" y="537" fill="white" text-anchor="middle">4</text><text class="t h" x="185" y="537">Verify profile</text><text class="t b" x="115" y="598" fill="#607087"><tspan x="115" dy="0">Confirm Fusion-like menu</tspan><tspan x="115" dy="30">and workspace selector.</tspan></text></g><path d="M510 588 L560 588" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="580" y="470" width="430" height="235"/><circle cx="635" cy="528" r="31" fill="#3d7eff"/><text class="t h" x="635" y="537" fill="white" text-anchor="middle">5</text><text class="t h" x="685" y="537">Run smoke test</text><text class="t b" x="615" y="598" fill="#607087"><tspan x="615" dy="0">Execute the versioned</tspan><tspan x="615" dy="30">SmokeTest macro.</tspan></text></g><path d="M1010 588 L1060 588" stroke="#3d7eff" stroke-width="4" marker-end="url(#arrow)"/><g><rect class="card" x="1080" y="470" width="430" height="235"/><circle cx="1135" cy="528" r="31" fill="#3d7eff"/><text class="t h" x="1135" y="537" fill="white" text-anchor="middle">6</text><text class="t h" x="1185" y="537">Report results</text><text class="t b" x="1115" y="598" fill="#607087"><tspan x="1115" dy="0">Include version, OS, steps,</tspan><tspan x="1115" dy="30">selection, and Report view.</tspan></text></g></svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Assembly workflow and diagnostics"><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#172033" flood-opacity="0.14"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3d7eff"/></marker><style>.t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#172033}.title{font-size:34px;font-weight:750}.h{font-size:23px;font-weight:700}.b{font-size:18px;font-weight:500}.s{font-size:15px;font-weight:500}.xs{font-size:13px;font-weight:500}.muted{fill:#607087}.card{fill:white;stroke:#d9e1ec;stroke-width:2;rx:16;filter:url(#shadow)}</style></defs><rect width="100%" height="100%" fill="#f7f9fc"/><text class="t title" x="60" y="70">Assembly: add, duplicate, mate, diagnose</text><text class="t b muted" x="60" y="105">A repeatable component-instance workflow</text><g><rect class="card" x="70" y="160" width="445" height="235"/><rect x="70" y="160" width="12" height="235" rx="6" fill="#3d7eff"/><circle cx="140" cy="220" r="32" fill="#3d7eff"/><text class="t h" x="140" y="229" fill="white" text-anchor="middle">1</text><text class="t h" x="190" y="228">Add Selected</text><text class="t b" x="115" y="295" fill="#607087"><tspan x="115" dy="0">Create App::Link instances</tspan><tspan x="115" dy="30">in the active Assembly.</tspan></text></g><g><rect class="card" x="575" y="160" width="445" height="235"/><rect x="575" y="160" width="12" height="235" rx="6" fill="#00a6a6"/><circle cx="645" cy="220" r="32" fill="#00a6a6"/><text class="t h" x="645" y="229" fill="white" text-anchor="middle">2</text><text class="t h" x="695" y="228">Copy / Paste</text><text class="t b" x="620" y="295" fill="#607087"><tspan x="620" dy="0">Ctrl+C, Ctrl+V,</tspan><tspan x="620" dy="30">Ctrl+Shift+V, Ctrl+D.</tspan></text></g><g><rect class="card" x="1080" y="160" width="445" height="235"/><rect x="1080" y="160" width="12" height="235" rx="6" fill="#f4a261"/><circle cx="1150" cy="220" r="32" fill="#f4a261"/><text class="t h" x="1150" y="229" fill="white" text-anchor="middle">3</text><text class="t h" x="1200" y="228">Ground one component</text><text class="t b" x="1125" y="295" fill="#607087"><tspan x="1125" dy="0">Establish the assembly</tspan><tspan x="1125" dy="30">reference frame.</tspan></text></g><g><rect class="card" x="70" y="460" width="445" height="235"/><rect x="70" y="460" width="12" height="235" rx="6" fill="#7d67c7"/><circle cx="140" cy="520" r="32" fill="#7d67c7"/><text class="t h" x="140" y="529" fill="white" text-anchor="middle">4</text><text class="t h" x="190" y="528">Pick two connectors</text><text class="t b" x="115" y="595" fill="#607087"><tspan x="115" dy="0">Use geometry on two different</tspan><tspan x="115" dy="30">component instances.</tspan></text></g><g><rect class="card" x="575" y="460" width="445" height="235"/><rect x="575" y="460" width="12" height="235" rx="6" fill="#54b689"/><circle cx="645" cy="520" r="32" fill="#54b689"/><text class="t h" x="645" y="529" fill="white" text-anchor="middle">5</text><text class="t h" x="695" y="528">Create joint</text><text class="t b" x="620" y="595" fill="#607087"><tspan x="620" dy="0">Fixed, revolute, cylindrical,</tspan><tspan x="620" dy="30">slider, ball, distance…</tspan></text></g><g><rect class="card" x="1080" y="460" width="445" height="235"/><rect x="1080" y="460" width="12" height="235" rx="6" fill="#d95d5d"/><circle cx="1150" cy="520" r="32" fill="#d95d5d"/><text class="t h" x="1150" y="529" fill="white" text-anchor="middle">6</text><text class="t h" x="1200" y="528">Read diagnostics</text><text class="t b" x="1125" y="595" fill="#607087"><tspan x="1125" dy="0">Preflight, live task panel,</tspan><tspan x="1125" dy="30">and decoded solver status.</tspan></text></g><rect x="170" y="730" width="1260" height="110" rx="18" fill="#fff7ed" stroke="#f4a261" stroke-width="2"/><text class="t h" x="205" y="775">Mate failure report includes:</text><text class="t b" x="205" y="812">connector count · component identity · geometry type · grounding · closed loops · decoded solver code</text></svg>
 <rect x="665" y="158" width="180" height="34" rx="8" fill="#33415f"/><text class="t s" x="755" y="181" fill="white" text-anchor="middle">MODIFY</text>
 <rect x="860" y="158" width="270" height="34" rx="8" fill="#33415f"/><text class="t s" x="995" y="181" fill="white" text-anchor="middle">CONSTRUCT / INSPECT</text>
 <rect x="1150" y="158" width="150" height="34" rx="8" fill="#33415f"/><text class="t s" x="1225" y="181" fill="white" text-anchor="middle">SEARCH</text>
 <rect x="60" y="203" width="265" height="510" fill="#eef2f7" stroke="#d9e1ec"/>
 <text class="t h" x="82" y="245">Model browser</text>
 <rect x="82" y="270" width="220" height="45" rx="7" fill="white" stroke="#d9e1ec"/><text class="t s" x="102" y="298">▾ Body</text>
 <text class="t s" x="120" y="345">Sketch</text><text class="t s" x="120" y="380">Pad</text><text class="t s" x="120" y="415">Thread</text>
 <rect x="325" y="203" width="935" height="510" fill="#f8fafc" stroke="#d9e1ec"/>
 <path d="M650 580 L650 360 L820 270 L1000 360 L1000 580 L820 670 Z" fill="#dce7f6" stroke="#3d7eff" stroke-width="4"/>
 <path d="M650 360 L820 455 L1000 360 M820 455 L820 670" fill="none" stroke="#00a6a6" stroke-width="4"/>
 <text class="t h" x="790" y="245">3D view</text>
 <rect x="1260" y="203" width="280" height="510" fill="#f3f6fa" stroke="#d9e1ec"/>
 <text class="t h" x="1282" y="245">Task / property panel</text>
 <rect x="1282" y="272" width="235" height="70" rx="9" fill="white" stroke="#d9e1ec"/><text class="t s" x="1298" y="300">Context-sensitive options</text><text class="t xs muted" x="1298" y="324">Hole, Thread, Joint, View…</text>
 <rect x="60" y="713" width="1480" height="97" rx="0" fill="#e9eef5" stroke="#d9e1ec"/>
 <text class="t h" x="82" y="754">Parametric timeline</text>
 <g transform="translate(330,731)"><rect width="150" height="58" rx="10" fill="white" stroke="#d9e1ec"/><text class="t s" x="75" y="35" text-anchor="middle">Sketch</text></g>
 <g transform="translate(495,731)"><rect width="150" height="58" rx="10" fill="white" stroke="#d9e1ec"/><text class="t s" x="75" y="35" text-anchor="middle">Pad</text></g>
 <g transform="translate(660,731)"><rect width="150" height="58" rx="10" fill="white" stroke="#00a6a6" stroke-width="3"/><text class="t s" x="75" y="35" text-anchor="middle">Hole / Thread</text></g>
</g>
<path d="M145 125 L145 151" stroke="#3d7eff" stroke-width="3" marker-end="url(#arrow)"/><text class="t s" x="68" y="128">Workspace ribbon</text>
<path d="M220 840 L220 800" stroke="#3d7eff" stroke-width="3" marker-end="url(#arrow)"/><text class="t s" x="60" y="872">Right-click a compatible feature to move the Body Tip</text>

</svg>
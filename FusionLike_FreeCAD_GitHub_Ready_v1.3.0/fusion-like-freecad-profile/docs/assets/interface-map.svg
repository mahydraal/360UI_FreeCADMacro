<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Conceptual Fusion-like FreeCAD interface map">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#172033" flood-opacity="0.14"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3d7eff"/></marker>
  <style>
    .t { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #172033; }
    .title { font-size: 34px; font-weight: 750; }
    .h { font-size: 23px; font-weight: 700; }
    .b { font-size: 18px; font-weight: 500; }
    .s { font-size: 15px; font-weight: 500; }
    .xs { font-size: 13px; font-weight: 500; }
    .muted { fill: #607087; }
    .card { fill: white; stroke: #d9e1ec; stroke-width: 2; rx: 16; filter: url(#shadow); }
  </style>
</defs>
<rect width="100%" height="100%" fill="#f7f9fc"/>

<text class="t title" x="60" y="70">Interface map</text>
<text class="t b muted" x="60" y="105">Conceptual layout after the profile is applied</text>
<g filter="url(#shadow)">
 <rect x="60" y="145" width="1480" height="665" rx="18" fill="white" stroke="#d9e1ec" stroke-width="2"/>
 <rect x="60" y="145" width="1480" height="58" rx="18" fill="#172033"/><rect x="60" y="185" width="1480" height="18" fill="#172033"/>
 <text class="t b" x="90" y="182" fill="white">Workspace selector</text>
 <rect x="260" y="158" width="190" height="34" rx="8" fill="#33415f"/><text class="t s" x="355" y="181" fill="white" text-anchor="middle">DESIGN ▾</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" role="img" aria-label="Dimensionable drawing model view workflow">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#172033" flood-opacity="0.14"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3d7eff"/></marker>
  <style>
    .t { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #172033; }
    .title { font-size: 34px; font-weight: 750; }
    .h { font-size: 23px; font-weight: 700; }
    .b { font-size: 18px; font-weight: 500; }
    .s { font-size: 15px; font-weight: 500; }
    .xs { font-size: 13px; font-weight: 500; }
    .muted { fill: #607087; }
    .card { fill: white; stroke: #d9e1ec; stroke-width: 2; rx: 16; filter: url(#shadow); }
  </style>
</defs>
<rect width="100%" height="100%" fill="#f7f9fc"/>

<text class="t title" x="60" y="70">Drawing: model view vs. viewport snapshot</text>
<text class="t b muted" x="60" y="105">Only model-linked TechDraw geometry is normally dimensionable</text>
<g><rect class="card" x="70" y="155" width="680" height="560"/>
<rect x="70" y="155" width="680" height="74" rx="16" fill="#54b689"/><text class="t h" x="410" y="201" fill="white" text-anchor="middle">Correct engineering-drawing path</text>
<text class="t h" x="110" y="280">1. New Sheet</text><text class="t b muted" x="110" y="315">Create or select a TechDraw page.</text>
<text class="t h" x="110" y="375">2. Insert Model View</text><text class="t b muted" x="110" y="410">Select a Body, Part, Link, component, or Assembly.</text>
<text class="t h" x="110" y="470">3. Place base / projected views</text><text class="t b muted" x="110" y="505">Finish the native orientation task.</text>
<text class="t h" x="110" y="565">4. Select drawing edges or vertices</text><text class="t b muted" x="110" y="600">Then use Smart Dimension or a specific dimension tool.</text>
<circle cx="650" cy="650" r="34" fill="#54b689"/><path d="M633 650 l12 12 25 -30" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<g><rect class="card" x="850" y="155" width="680" height="560"/>
<rect x="850" y="155" width="680" height="74" rx="16" fill="#d95d5d"/><text class="t h" x="1190" y="201" fill="white" text-anchor="middle">Reference image path</text>
<text class="t h" x="890" y="280">Active View Snapshot</text><text class="t b muted" x="890" y="320">Captures the open 3D viewport as an image.</text>
<rect x="935" y="370" width="510" height="230" rx="14" fill="#e9eef5" stroke="#d9e1ec"/><path d="M1010 555 L1110 445 L1185 510 L1275 405 L1380 555 Z" fill="#c8d5e7"/><circle cx="1315" cy="430" r="30" fill="#f4a261"/>
<text class="t b" x="1190" y="650" text-anchor="middle" fill="#d95d5d">Raster image — no associative edges for dimensions</text>
</g>
</svg>